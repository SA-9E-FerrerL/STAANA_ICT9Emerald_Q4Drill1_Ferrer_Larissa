<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Drill 1</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container text-center mt-5">

    <h1 class="mb-3"> ᯓ★ Electricity Consumption Classifier</h1>
    <p>Welcome to Callisto Electricity! ݁ ˖Ი𐑼⋆ Enter your electricity usage (kWh) to know your consumption category. ૮ ྀིᴗ͈ . ᴗ͈ ྀིა</p>

    <div class="card p-4 shadow-lg">
        <div class="text-center">
        <img src="CALLISTO.png" class="mb-3" style="height: 50%; width: 50%;">
        </div>

        <input type="number" id="consumption" class="form-control mb-3" placeholder="Enter kWh">

        <button class="btn btn-warning" onclick="check_class()">Check Classification ꒰ঌ ໒꒱</button>

        <p id="message1" class="mt-3 fst-italic"></p>

    </div>

    <p class="mt-4">
        Source: 
        <a href="https://www.meralco.com.ph" target="_blank">Meralco</a>
    </p>

</div>

<script>
function check_class(){

    var checker = Number(document.getElementById("consumption").value);
    var message = "";

    if (isNaN(checker) || checker <= 0) {
        message = "Please enter a valid number! (╥‸╥)";
    }

    else if (checker <= 100) {
        message = "Lifeline Consumer: Discounted electricity rates! ヽ(°〇°)ﾉ ";
    }

    else if (checker <= 200) {
        message = "Low Consumption: Normal residential rate. (๑ᵔ⤙ᵔ๑)";
    }

    else if (checker <= 300) {
        message = "Average Consumption: Typical electricity usage. (˶>⩊<˶)";
    }

    else if (checker <= 500) {
        message = "High Consumption: Higher electricity usage. (ᵕ—ᴗ—)";
    }

    else {
        message = "Take a break! Very High Consumption: Heavy electricity users. ｡°(°¯᷄◠¯᷅°)°｡";
    }

    document.getElementById("message1").innerHTML = message;
}
</script>

</body>
</html>
